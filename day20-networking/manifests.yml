apiVersion: v1
kind: Pod
metadata:
  name: nginx
  labels:
    role: nginx
spec:
  containers:
  - name: nginx
    image: nginx
    ports:
    - containerPort: 80
      name: http
      protocol: TCP
---

apiVersion: v1
kind: Service
metadata:
  name: nginx
  labels:
    role: nginx  
spec:
  selector:
    role: nginx
  ports:
  - protocol: TCP
    port: 80
    targetPort: 80

---
