apiVersion: apps/v1
kind: ReplicaSet
metadata:
  name: nginx-rs
  labels:
    env: demo
spec:
  template:
    metadata:
      labels:
        env: demo 
      name: niginx
    spec:
      containers:
      - name: nginx-container
        image: nginx
        ports:
        - containerPort: 80  
  replicas: 3
  selector: 
    matchLabels: 
      env: demo
      
        
